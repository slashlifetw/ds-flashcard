<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DS Flashcard</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f7f4; --surface: #ffffff; --border: #e5e2d9;
  --text: #1a1a1a; --muted: #888; --hint: #bbb;
  --accent: #4f46e5; --accent-light: #ede9fe; --accent-text: #3730a3;
  --success: #16a34a; --success-bg: #f0fdf4; --success-border: #bbf7d0;
  --danger: #dc2626; --danger-bg: #fef2f2; --danger-border: #fecaca;
  --warn-bg: #fffbeb; --warn-border: #fde68a; --warn-text: #92400e;
  --radius: 10px; --radius-sm: 6px;
}
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }
.screen { display: none; max-width: 540px; margin: 0 auto; padding: 16px 16px 60px; }
.screen.active { display: block; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; position: sticky; top: 0; z-index: 50; max-width: 540px; margin: 0 auto; }
.topbar-row { display: flex; align-items: center; gap: 10px; }
.back-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: var(--radius-sm); padding: 5px 11px; font-size: 12px; cursor: pointer; -webkit-appearance: none; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
.btn { display: block; width: 100%; padding: 12px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; border: none; text-align: center; -webkit-appearance: none; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:disabled { background: var(--hint); cursor: not-allowed; }
.btn-secondary { background: none; border: 1px solid var(--border); color: var(--text); }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; -webkit-appearance: none; }
.btn-sm.danger { color: var(--danger); border-color: var(--danger-border); }
.btn-google { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); font-size: 14px; font-weight: 600; cursor: pointer; -webkit-appearance: none; }
label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 4px; }
input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); margin-bottom: 12px; -webkit-appearance: none; border-radius: var(--radius-sm); }
textarea { resize: vertical; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
.badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.alert { border-radius: var(--radius-sm); padding: 10px 14px; font-size: 12px; line-height: 1.6; margin: 10px 0; }
.alert-warn { background: var(--warn-bg); border: 1px solid var(--warn-border); color: var(--warn-text); }
.alert-info { background: var(--accent-light); border: 1px solid #c7d2fe; color: var(--accent-text); }
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 10px; }
.stat-cell { background: var(--surface); padding: 14px 10px; text-align: center; }
.stat-num { font-size: 24px; font-weight: 700; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
.prog-wrap { background: var(--border); border-radius: 10px; height: 4px; margin-top: 8px; }
.prog-bar { background: var(--accent); height: 4px; border-radius: 10px; transition: width .3s; }
#draw-canvas { touch-action: none; cursor: crosshair; display: block; width: 100%; }
.pen-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-appearance: none; }
.pen-btn.active { border-color: var(--accent); background: var(--accent-light); }
.result-card { border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
.result-card.correct { background: var(--success-bg); border: 1px solid var(--success-border); }
.result-card.wrong { background: var(--danger-bg); border: 1px solid var(--danger-border); }
.card-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; }
/* Math toolbar */
.math-toolbar { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; padding: 8px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); }
.math-btn { padding: 4px 8px; font-size: 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); cursor: pointer; color: var(--accent-text); -webkit-appearance: none; white-space: nowrap; font-family: 'Courier New', monospace; }
.math-btn:active { background: var(--accent-light); }
.math-preview { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; min-height: 36px; margin-bottom: 12px; font-size: 13px; line-height: 1.9; }
.math-hint { font-size: 11px; color: var(--muted); margin-top: -8px; margin-bottom: 6px; }
.math-render .katex { font-size: 1em; }
#loading { position: fixed; inset: 0; background: rgba(255,255,255,.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; gap: 12px; font-size: 13px; color: var(--muted); }
#loading.hidden { display: none; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.muted { font-size: 12px; color: var(--muted); }
.section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
h2 { font-size: 16px; font-weight: 700; }
.divider { height: 1px; background: var(--border); margin: 14px 0; }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><span id="loading-text">載入中…</span></div>

<!-- Setup -->
<div id="screen-setup" class="screen">
  <div style="padding-top:32px;text-align:center;margin-bottom:28px">
    <div style="font-size:36px;margin-bottom:8px">📚</div>
    <h1 style="font-size:22px;font-weight:700;margin-bottom:4px">DS Flashcard</h1>
    <div class="muted">研究所資料結構備考系統</div>
  </div>
  <div class="card">
    <div class="section-title">輸入 Anthropic API Key</div>
    <div class="alert alert-info">AI 批改需要此 Key，只儲存在你的瀏覽器裡。</div>
    <label>Anthropic API Key</label>
    <input type="password" id="setup-key" placeholder="sk-ant-xxxxxxxxxxxxxxxx">
    <button class="btn btn-primary" onclick="saveSetup()">儲存並繼續</button>
  </div>
</div>

<!-- Login -->
<div id="screen-login" class="screen">
  <div style="padding-top:48px;text-align:center;margin-bottom:32px">
    <div style="font-size:40px;margin-bottom:10px">📚</div>
    <h1 style="font-size:22px;font-weight:700;margin-bottom:6px">DS Flashcard</h1>
    <div class="muted">用 Google 帳號登入以同步 Drive 資料</div>
  </div>
  <button class="btn-google" onclick="signIn()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.01c-.72.48-1.63.76-2.7.76-2.09 0-3.85-1.42-4.49-3.32H1.8v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.49 10.49A4.7 4.7 0 0 1 4.24 9c0-.52.09-1.02.25-1.49V5.44H1.8a8 8 0 0 0 0 7.12l2.69-2.07z"/><path fill="#EA4335" d="M8.98 3.58c1.18 0 2.23.41 3.07 1.2l2.3-2.3A8 8 0 0 0 1.8 5.44L4.49 7.51c.64-1.9 2.4-3.93 4.49-3.93z"/></svg>
    使用 Google 帳號登入
  </button>
  <div style="text-align:center;margin-top:14px">
    <span class="muted" style="cursor:pointer;text-decoration:underline" onclick="showScreen('setup')">重新設定 API Key</span>
  </div>
</div>

<!-- Home -->
<div id="screen-home" class="screen">
  <div class="topbar">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div class="muted" style="font-size:11px">DS Flashcard</div>
        <div style="font-weight:700;font-size:16px" id="home-greeting">備考中！</div>
      </div>
      <button class="btn-sm" onclick="signOut()">登出</button>
    </div>
  </div>
  <div id="home-body" style="padding:14px 0 0"></div>
</div>

<!-- Quiz -->
<div id="screen-quiz" class="screen" style="padding:0">
  <div class="topbar">
    <div class="topbar-row" style="justify-content:space-between">
      <div class="topbar-row">
        <button class="back-btn" onclick="exitQuiz()">← 離開</button>
        <div>
          <div class="muted" style="font-size:11px" id="quiz-cat"></div>
          <div style="font-weight:700" id="quiz-progress"></div>
        </div>
      </div>
      <div class="muted" id="quiz-pct"></div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="quiz-prog-bar" style="width:0%"></div></div>
  </div>
  <div style="padding:14px 16px 60px" id="quiz-body"></div>
</div>

<!-- Manage -->
<div id="screen-manage" class="screen" style="padding:0">
  <div class="topbar">
    <div class="topbar-row" style="justify-content:space-between">
      <div class="topbar-row">
        <button class="back-btn" onclick="showScreen('home');renderHome()">← 返回</button>
        <h2>題庫管理</h2>
      </div>
      <button class="btn btn-primary" style="width:auto;padding:6px 14px;margin:0;font-size:13px" onclick="openAddNew()">＋ 新增</button>
    </div>
    <input type="search" id="search-input" placeholder="搜尋題目或分類…" style="margin-top:10px;margin-bottom:0" oninput="renderManage()">
  </div>
  <div style="padding:12px 16px 60px" id="manage-body"></div>
</div>

<!-- Add/Edit -->
<div id="screen-add" class="screen" style="padding:0">
  <div class="topbar">
    <div class="topbar-row">
      <button class="back-btn" onclick="showScreen('manage');renderManage()">← 返回</button>
      <h2 id="add-title">新增題目</h2>
    </div>
  </div>
  <div style="padding:14px 16px 60px">
    <div class="card">
      <label>分類</label>
      <select id="f-category">
        <option>Tree</option><option>Graph</option><option>Sorting</option>
        <option>Hashing</option><option>Heap</option><option>Dynamic Programming</option><option>其他</option>
      </select>

      <label>題目</label>
      <div class="math-toolbar" id="toolbar-q"></div>
      <textarea id="f-question" rows="4" placeholder="輸入題目… 數學式用 $…$ 包住，例如 $O(n^2)$、$\log n$" oninput="updatePreview('q')"></textarea>
      <div class="math-hint">▸ 預覽（數學式會自動渲染）</div>
      <div class="math-preview math-render" id="preview-q"></div>

      <label>標準答案</label>
      <div class="math-toolbar" id="toolbar-a"></div>
      <textarea id="f-answer" rows="6" placeholder="輸入標準答案…" oninput="updatePreview('a')"></textarea>
      <div class="math-hint">▸ 預覽</div>
      <div class="math-preview math-render" id="preview-a"></div>

      <button class="btn btn-primary" onclick="saveCard()">儲存</button>
      <button class="btn btn-secondary" onclick="showScreen('manage');renderManage()">取消</button>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = "16377008216-n7srio84pbbfkm6q8fdmq3ss3po1pbum.apps.googleusercontent.com";
const SCOPE = "https://www.googleapis.com/auth/drive.file";
const FILE_NAME = "ds_flashcards.json";
const CATS = ["Tree","Graph","Sorting","Hashing","Heap","Dynamic Programming","其他"];
const CAT_COLOR = { Tree:"#ede9fe:#5b21b6", Graph:"#d1fae5:#065f46", Sorting:"#fef9c3:#854d0e", Hashing:"#fee2e2:#991b1b", Heap:"#fce7f3:#9d174d", "Dynamic Programming":"#dbeafe:#1e3a8a", "其他":"#f1f5f9:#475569" };

const MATH_SYMS = [
  {l:"O(n)",v:"$O(n)$"},{l:"O(n²)",v:"$O(n^2)$"},{l:"O(n log n)",v:"$O(n \\log n)$"},
  {l:"O(log n)",v:"$O(\\log n)$"},{l:"Ω(n)",v:"$\\Omega(n)$"},{l:"Θ(n)",v:"$\\Theta(n)$"},
  {l:"log",v:"$\\log$"},{l:"lg",v:"$\\lg$"},{l:"√n",v:"$\\sqrt{n}$"},
  {l:"≤",v:"$\\leq$"},{l:"≥",v:"$\\geq$"},{l:"∞",v:"$\\infty$"},
  {l:"xⁿ",v:"$x^{}$"},{l:"xₙ",v:"$x_{}$"},{l:"∑",v:"$\\sum_{i=1}^{n}$"},
  {l:"⌈x⌉",v:"$\\lceil x \\rceil$"},{l:"⌊x⌋",v:"$\\lfloor x \\rfloor$"},
  {l:"n!",v:"$n!$"},{l:"→",v:"$\\rightarrow$"},{l:"∀",v:"$\\forall$"},
];

let accessToken=null, driveFileId=null, cards=[], editId=null;
let quizQueue=[], quizIdx=0, penSize=3, isDrawing=false, lastPos=null;

// ── SCREEN (fixed for iOS) ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => {
    s.style.display = 'none';
    s.classList.remove('active');
  });
  const t = document.getElementById('screen-' + name);
  if (!t) return;
  t.style.display = 'block';
  t.classList.add('active');
  window.scrollTo(0, 0);
}

function loading(show, text) {
  document.getElementById('loading').classList.toggle('hidden', !show);
  if (text) document.getElementById('loading-text').textContent = text;
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function badgeHtml(cat) {
  const [bg,fg] = (CAT_COLOR[cat]||CAT_COLOR["其他"]).split(":");
  return `<span class="badge" style="background:${bg};color:${fg}">${cat}</span>`;
}

// ── MATH ──
function renderMath(text) {
  if (!window.katex || !text) return text || "";
  const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return escaped.replace(/\$([^$\n]+)\$/g, (_,expr) => {
    try { return katex.renderToString(expr, {throwOnError:false}); }
    catch(e) { return '$'+expr+'$'; }
  });
}
function updatePreview(f) {
  const ta = document.getElementById(f==='q'?'f-question':'f-answer');
  const pv = document.getElementById('preview-'+f);
  if (ta && pv) pv.innerHTML = renderMath(ta.value);
}
function buildToolbar(tid, targetId) {
  const tb = document.getElementById(tid);
  if (!tb) return;
  tb.innerHTML = '<span style="font-size:11px;color:var(--muted);align-self:center;flex-shrink:0">插入：</span>';
  MATH_SYMS.forEach(s => {
    const b = document.createElement('button');
    b.className = 'math-btn'; b.textContent = s.l; b.type = 'button';
    b.addEventListener('click', () => insertAt(document.getElementById(targetId), s.v));
    tb.appendChild(b);
  });
}
function insertAt(ta, text) {
  if (!ta) return;
  ta.focus();
  const st=ta.selectionStart, en=ta.selectionEnd;
  ta.value = ta.value.slice(0,st) + text + ta.value.slice(en);
  ta.selectionStart = ta.selectionEnd = st + text.length;
  ta.dispatchEvent(new Event('input'));
}

// ── SETUP ──
function getApiKey() { return localStorage.getItem('anthropic_key')||''; }
function saveSetup() {
  const k = document.getElementById('setup-key').value.trim();
  if (!k.startsWith('sk-ant-')) { alert('格式不正確，應以 sk-ant- 開頭'); return; }
  localStorage.setItem('anthropic_key', k);
  showScreen('login');
}

// ── GOOGLE AUTH ──
let tokenClient;
function initGoogleAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPE,
    callback: async resp => {
      if (resp.error) { alert('Google 登入失敗：'+resp.error); return; }
      accessToken = resp.access_token;
      loading(true,'讀取雲端資料…');
      await loadDriveData();
      loading(false);
      showScreen('home');
      renderHome();
    }
  });
}
function signIn() { tokenClient.requestAccessToken(); }
function signOut() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken, ()=>{});
  accessToken=null; driveFileId=null; cards=[];
  showScreen('login');
}

// ── DRIVE ──
async function driveReq(url, opts={}) {
  const r = await fetch(url, {...opts, headers:{"Authorization":"Bearer "+accessToken,...(opts.headers||{})}});
  if (!r.ok) throw new Error("Drive "+r.status);
  return r;
}
async function loadDriveData() {
  const r = await driveReq(`https://www.googleapis.com/drive/v3/files?q=name='${FILE_NAME}'+and+trashed=false&fields=files(id)`);
  const d = await r.json();
  if (d.files?.length) {
    driveFileId = d.files[0].id;
    const f = await driveReq(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`);
    const j = await f.json();
    cards = j.cards || [];
  } else { cards = getSampleCards(); await saveToDrive(); }
}
async function saveToDrive() {
  const blob = new Blob([JSON.stringify({version:2,lastSync:Date.now(),cards})],{type:'application/json'});
  const form = new FormData();
  if (driveFileId) {
    form.append('metadata', new Blob([JSON.stringify({name:FILE_NAME})],{type:'application/json'}));
    form.append('file', blob);
    await driveReq(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=multipart`,{method:'PATCH',body:form});
  } else {
    form.append('metadata', new Blob([JSON.stringify({name:FILE_NAME,mimeType:'application/json'})],{type:'application/json'}));
    form.append('file', blob);
    const res = await driveReq(`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id`,{method:'POST',body:form});
    driveFileId = (await res.json()).id;
  }
}

// ── SM-2 ──
function applySmTwo(card, correct) {
  const c = {...card};
  if (correct) {
    if (c.repetitions===0) c.interval=1;
    else if (c.repetitions===1) c.interval=6;
    else c.interval=Math.round(c.interval*c.easeFactor);
    c.repetitions++; c.easeFactor=Math.max(1.3,parseFloat((c.easeFactor+0.1).toFixed(2)));
  } else { c.repetitions=0; c.interval=1; c.easeFactor=Math.max(1.3,parseFloat((c.easeFactor-0.2).toFixed(2))); }
  c.nextReview = Date.now()+c.interval*86400000;
  return c;
}
function createCard(q,a,cat) { return {id:uid(),question:q,answer:a,category:cat,repetitions:0,interval:1,easeFactor:2.5,nextReview:Date.now(),createdAt:Date.now()}; }
function getSampleCards() {
  return [
    {question:"請說明 AVL Tree 的平衡條件，並列舉四種旋轉情況（LL, RR, LR, RL）",answer:"每個節點左右子樹高度差（Balance Factor）絕對值 $\\leq 1$。LL→右旋、RR→左旋、LR→先左旋左子再右旋、RL→先右旋右子再左旋。",category:"Tree"},
    {question:"分析 Quick Sort 的最佳、平均、最差時間複雜度，並說明最差情況何時發生",answer:"最佳 $O(n \\log n)$、平均 $O(n \\log n)$、最差 $O(n^2)$。最差情況：每次 pivot 選到最大或最小值（如已排序數列選第一個元素）。",category:"Sorting"},
    {question:"什麼是 Hash Collision？請說明 Chaining 和 Open Addressing 兩種解決方式",answer:"不同 key 映射到相同 hash 值。Chaining：同 slot 用 linked list；Open Addressing：線性探測 / 二次探測 / 雙重雜湊找下一個空 slot。",category:"Hashing"},
    {question:"請說明 Dijkstra 演算法的運作流程與時間複雜度",answer:"單源最短路徑。每次選未訪問中 dist 最小的節點更新鄰居。Min-heap：$O((V+E)\\log V)$；陣列：$O(V^2)$。",category:"Graph"},
    {question:"請說明 Heap Sort 的原理與時間複雜度，並說明為何不穩定",answer:"Build Max-Heap $O(n)$，反覆取出最大值 heapify $O(\\log n)$，共 $n$ 次，總 $O(n \\log n)$。不穩定因 heapify 改變相同鍵值相對順序。",category:"Heap"},
    {question:"解釋動態規劃的兩個核心性質，並舉一例說明",answer:"最優子結構：最優解包含子問題最優解；重疊子問題：子問題被重複計算。例：Fibonacci 從 $O(2^n)$ 用 memoization 降至 $O(n)$。",category:"Dynamic Programming"},
  ].map(s=>createCard(s.question,s.answer,s.category));
}

// ── HOME ──
function renderHome() {
  const now=Date.now(), due=cards.filter(c=>c.nextReview<=now), mastered=cards.filter(c=>c.repetitions>=3);
  const hr=new Date().getHours();
  document.getElementById('home-greeting').textContent = hr<12?'早安！':hr<18?'午安！':'晚安！';
  const catStats = CATS.map(cat=>{
    const tot=cards.filter(c=>c.category===cat).length;
    const d=cards.filter(c=>c.category===cat&&c.nextReview<=now).length;
    return tot?`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">${badgeHtml(cat)}<span class="muted">${tot} 題${d>0?`，${d} 待複習`:''}</span></div>`:'';
  }).join('');
  document.getElementById('home-body').innerHTML = `
    <div class="stat-grid">
      <div class="stat-cell"><div class="stat-num" style="color:var(--accent)">${cards.length}</div><div class="stat-lbl">題庫總數</div></div>
      <div class="stat-cell"><div class="stat-num" style="color:${due.length>0?'var(--danger)':'var(--success)'}">${due.length}</div><div class="stat-lbl">今日待複習</div></div>
      <div class="stat-cell"><div class="stat-num" style="color:var(--success)">${mastered.length}</div><div class="stat-lbl">已掌握</div></div>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">${due.length>0?`開始複習　${due.length} 題待複習`:'今日已複習完畢 🎉'}</button>
    <button class="btn btn-secondary" onclick="showScreen('manage');renderManage()">題庫管理</button>
    <div class="card"><div class="section-title">分類統計</div>${catStats||'<div class="muted">題庫為空</div>'}</div>
    <div class="muted" style="text-align:center;font-size:11px;padding-top:4px">SM-2 間隔重複・答對間隔加倍，答錯明日重試</div>
  `;
}

// ── QUIZ ──
function startQuiz() {
  const due=cards.filter(c=>c.nextReview<=Date.now());
  if (!due.length){alert('今日沒有待複習題目！');return;}
  quizQueue=[...due].sort(()=>Math.random()-.5); quizIdx=0;
  showScreen('quiz'); renderQuiz();
}
function exitQuiz(){showScreen('home');renderHome();}
function renderQuiz() {
  const card=quizQueue[quizIdx], pct=Math.round((quizIdx/quizQueue.length)*100);
  document.getElementById('quiz-cat').textContent=card.category;
  document.getElementById('quiz-progress').textContent=`${quizIdx+1} / ${quizQueue.length}`;
  document.getElementById('quiz-pct').textContent=pct+'%';
  document.getElementById('quiz-prog-bar').style.width=pct+'%';
  document.getElementById('quiz-body').innerHTML=`
    <div class="card" style="margin-bottom:10px">
      <div class="muted" style="margin-bottom:6px">題目</div>
      <div class="math-render" style="font-size:15px;line-height:1.8">${renderMath(card.question)}</div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span class="muted" style="font-size:12px;font-weight:700">手寫作答</span>
        <div style="flex:1"></div>
        ${[2,3,5].map(ps=>`<button class="pen-btn${penSize===ps?' active':''}" onclick="setPen(${ps})"><div style="width:${ps*2}px;height:${ps*2}px;border-radius:50%;background:#1a1a1a"></div></button>`).join('')}
        <button class="btn-sm danger" onclick="clearCanvas()">清除</button>
      </div>
      <canvas id="draw-canvas" width="500" height="260" style="border:1px solid var(--border);border-radius:var(--radius-sm);height:220px;display:block;width:100%"></canvas>
    </div>
    <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()">提交答案，AI 批改</button>
  `;
  initCanvas();
}
function initCanvas() {
  const c=document.getElementById('draw-canvas'); if(!c) return;
  const ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,c.width,c.height);
  c.addEventListener('mousedown',onDown); c.addEventListener('mousemove',onMove);
  c.addEventListener('mouseup',onUp); c.addEventListener('mouseleave',onUp);
  c.addEventListener('touchstart',onDown,{passive:false}); c.addEventListener('touchmove',onMove,{passive:false}); c.addEventListener('touchend',onUp);
}
function getXY(e) {
  const c=document.getElementById('draw-canvas'), r=c.getBoundingClientRect();
  const sx=c.width/r.width, sy=c.height/r.height, src=e.touches?e.touches[0]:e;
  return {x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy};
}
function onDown(e){e.preventDefault();isDrawing=true;lastPos=getXY(e);}
function onMove(e){
  e.preventDefault(); if(!isDrawing) return;
  const c=document.getElementById('draw-canvas'), ctx=c.getContext('2d'), pos=getXY(e);
  ctx.beginPath(); ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=penSize; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.moveTo(lastPos.x,lastPos.y); ctx.lineTo(pos.x,pos.y); ctx.stroke(); lastPos=pos;
}
function onUp(){isDrawing=false;}
function clearCanvas(){const c=document.getElementById('draw-canvas');if(!c)return;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);}
function setPen(s){penSize=s;document.querySelectorAll('.pen-btn').forEach((b,i)=>b.classList.toggle('active',[2,3,5][i]===s));}

async function submitAnswer() {
  const btn=document.getElementById('submit-btn');
  if(btn){btn.disabled=true;btn.textContent='AI 批改中…';}
  const card=quizQueue[quizIdx];
  const imgData=document.getElementById('draw-canvas').toDataURL('image/jpeg',0.85).split(',')[1];
  let result;
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-opus-4-5', max_tokens:300,
        system:`你是資料結構考試批改老師。根據題目和標準答案，判斷圖片中學生手寫答案是否正確（大意正確即可）。只回傳 JSON：{"correct": true/false, "feedback": "一句說明（繁體中文，30字內）"}`,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgData}},
          {type:'text',text:`題目：${card.question}\n\n標準答案：${card.answer}`}
        ]}]
      })
    });
    const data=await res.json();
    result=JSON.parse((data.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
  } catch(e) { result={correct:null,feedback:'批改失敗，請確認 API Key'}; }

  if(result.correct!==null){
    const updated=applySmTwo(card,result.correct);
    cards=cards.map(c=>c.id===card.id?updated:c);
    try{await saveToDrive();}catch(e){}
  }
  const intv=result.correct?(card.interval<=1?'明天':card.interval<=6?'6 天後':`${card.interval} 天後`):'明天重試';
  const nextLbl=quizIdx+1>=quizQueue.length?'完成今日複習 ✓':'下一題 →';
  document.getElementById('quiz-body').insertAdjacentHTML('beforeend',`
    <div class="result-card ${result.correct?'correct':result.correct===false?'wrong':''}">
      <div style="font-size:28px;margin-bottom:6px">${result.correct?'✓':result.correct===false?'✗':'?'}</div>
      <div style="font-size:16px;font-weight:700;color:${result.correct?'var(--success)':'var(--danger)'}">
        ${result.correct?'答對了！':result.correct===false?'答錯了':'批改失敗'}
      </div>
      <div style="font-size:13px;margin-top:4px">${result.feedback}</div>
      <div class="divider"></div>
      <div class="muted" style="font-size:11px;margin-bottom:6px">標準答案</div>
      <div class="math-render" style="font-size:13px;line-height:1.8">${renderMath(card.answer)}</div>
      <div class="muted" style="margin-top:10px;text-align:right;font-size:11px">下次複習：${intv}</div>
    </div>
    <button class="btn btn-primary" onclick="nextCard()">${nextLbl}</button>
  `);
  window.scrollTo(0,document.body.scrollHeight);
}
function nextCard(){
  if(quizIdx+1>=quizQueue.length){showScreen('home');renderHome();return;}
  quizIdx++; renderQuiz(); window.scrollTo(0,0);
}

// ── MANAGE ──
function renderManage() {
  const q=(document.getElementById('search-input')?.value||'').toLowerCase();
  const filtered=cards.filter(c=>!q||c.question.toLowerCase().includes(q)||c.category.toLowerCase().includes(q));
  const now=Date.now();
  document.getElementById('manage-body').innerHTML=filtered.length===0
    ?`<div class="muted" style="text-align:center;padding:40px 0">${q?'無符合結果':'題庫為空，請先新增題目'}</div>`
    :filtered.map(c=>`
      <div class="card-item">
        <div style="display:flex;align-items:flex-start;gap:10px">
          <div style="flex:1;min-width:0">
            ${badgeHtml(c.category)}
            <div style="font-size:13px;margin-top:6px;line-height:1.55">${c.question.replace(/\$([^$\n]+)\$/g,(_,e)=>{try{return katex.renderToString(e,{throwOnError:false});}catch(ex){return '$'+e+'$';}})}</div>
            <div class="muted" style="margin-top:5px">複習 ${c.repetitions} 次・${c.nextReview<=now?'今日待複習':Math.ceil((c.nextReview-now)/86400000)+' 天後'}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn-sm" onclick="openEdit('${c.id}')">編輯</button>
            <button class="btn-sm danger" onclick="deleteCard('${c.id}')">刪除</button>
          </div>
        </div>
      </div>`).join('');
}
function openAddNew() {
  editId=null;
  document.getElementById('add-title').textContent='新增題目';
  document.getElementById('f-category').value='Tree';
  document.getElementById('f-question').value='';
  document.getElementById('f-answer').value='';
  document.getElementById('preview-q').innerHTML='';
  document.getElementById('preview-a').innerHTML='';
  buildToolbar('toolbar-q','f-question');
  buildToolbar('toolbar-a','f-answer');
  showScreen('add');
}
function openEdit(id) {
  const c=cards.find(x=>x.id===id); if(!c) return;
  editId=id;
  document.getElementById('add-title').textContent='編輯題目';
  document.getElementById('f-category').value=c.category;
  document.getElementById('f-question').value=c.question;
  document.getElementById('f-answer').value=c.answer;
  buildToolbar('toolbar-q','f-question');
  buildToolbar('toolbar-a','f-answer');
  updatePreview('q'); updatePreview('a');
  showScreen('add');
}
async function saveCard() {
  const cat=document.getElementById('f-category').value;
  const q=document.getElementById('f-question').value.trim();
  const a=document.getElementById('f-answer').value.trim();
  if(!q||!a){alert('請填寫題目和答案');return;}
  if(editId) cards=cards.map(c=>c.id===editId?{...c,category:cat,question:q,answer:a}:c);
  else cards.push(createCard(q,a,cat));
  loading(true,'儲存中…');
  try{await saveToDrive();}catch(e){alert('儲存失敗，請重試');}
  loading(false); editId=null;
  showScreen('manage'); renderManage();
}
async function deleteCard(id) {
  if(!confirm('確定刪除此題目？')) return;
  cards=cards.filter(c=>c.id!==id);
  loading(true,'刪除中…');
  try{await saveToDrive();}catch(e){}
  loading(false); renderManage();
}

// ── INIT ──
window.addEventListener('load', () => {
  loading(false);
  if (!getApiKey()) { showScreen('setup'); return; }
  const wait = setInterval(() => {
    if (window.google?.accounts?.oauth2) {
      clearInterval(wait);
      initGoogleAuth();
      showScreen('login');
    }
  }, 100);
});
</script>
</body>
