<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DS Flashcard v6</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#fff;--border:#e5e2d9;
  --text:#1a1a1a;--muted:#888;--hint:#bbb;
  --accent:#4f46e5;--accent-light:#ede9fe;--accent-text:#3730a3;
  --success:#16a34a;--success-bg:#f0fdf4;--success-border:#bbf7d0;
  --danger:#dc2626;--danger-bg:#fef2f2;--danger-border:#fecaca;
  --warn-bg:#fffbeb;--warn-border:#fde68a;--warn-text:#92400e;
  --radius:10px;--radius-sm:6px
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
.screen{display:none;max-width:540px;margin:0 auto;padding:16px 16px 60px}
.screen.active{display:block}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:50;max-width:540px;margin:0 auto}
.topbar-row{display:flex;align-items:center;gap:8px}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:var(--radius-sm);padding:5px 10px;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;white-space:nowrap}
.btn-sm.danger{color:var(--danger);border-color:var(--danger-border)}
.btn-sm.accent{color:var(--accent);border-color:var(--accent);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.btn{display:block;width:100%;padding:12px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;border:none;text-align:center}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:disabled{background:var(--hint);cursor:not-allowed}
.btn-secondary{background:none;border:1px solid var(--border);color:var(--text)}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font-size:14px;font-weight:600;cursor:pointer}
label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);margin-bottom:12px}
textarea{resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.alert{border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;line-height:1.6;margin:10px 0}
.alert-info{background:var(--accent-light);border:1px solid #c7d2fe;color:var(--accent-text)}
.alert-warn{background:var(--warn-bg);border:1px solid var(--warn-border);color:var(--warn-text)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.stat-cell{background:var(--surface);padding:14px 10px;text-align:center}
.stat-num{font-size:24px;font-weight:700}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.prog-wrap{background:var(--border);border-radius:10px;height:4px;margin-top:8px}
.prog-bar{background:var(--accent);height:4px;border-radius:10px;transition:width .3s}
.mode-toggle{display:grid;grid-template-columns:1fr 1fr;border-radius:var(--radius-sm);overflow:hidden;border:2px solid var(--accent);margin-bottom:14px}
.mode-btn{padding:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;background:none;color:var(--accent);transition:all .15s}
.mode-btn.active{background:var(--accent);color:#fff}
#draw-canvas{touch-action:none;cursor:crosshair;display:block;width:100%}
.canvas-wrap{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:10px}
.canvas-toolbar{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-bottom:1px solid var(--border)}
.pen-btn{width:28px;height:28px;border-radius:50%;border:2px solid transparent;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pen-btn.active{border-color:var(--accent);background:var(--accent-light)}
/* OCR preview box - same style as typing preview */
.ocr-preview{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;min-height:52px;margin-bottom:10px;font-size:14px;line-height:1.8;color:var(--muted);font-family:inherit}
.ocr-preview.has-content{color:var(--text)}
.ocr-preview .ocr-scanning{color:var(--accent-text);font-size:12px;display:flex;align-items:center;gap:6px}
.preview-label{font-size:10px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.type-area{width:100%;min-height:160px;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;resize:vertical;background:var(--surface);color:var(--text);margin-bottom:10px;display:block}
.type-area:focus{outline:none;border-color:var(--accent)}
.answer-preview{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;min-height:52px;margin-bottom:10px;font-size:14px;line-height:1.8;color:var(--muted);word-break:break-word}
.answer-preview.has-content{color:var(--text)}
.result-card{border-radius:var(--radius);padding:16px;margin-bottom:10px}
.result-card.correct{background:var(--success-bg);border:1px solid var(--success-border)}
.result-card.wrong{background:var(--danger-bg);border:1px solid var(--danger-border)}
.card-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px}
.math-toolbar{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;padding:8px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border)}
.math-btn{padding:4px 8px;font-size:12px;border:1px solid var(--border);border-radius:4px;background:var(--surface);cursor:pointer;color:var(--accent-text);white-space:nowrap;font-family:'Courier New',monospace}
.math-btn:active{background:var(--accent-light)}
.math-hint{font-size:11px;color:var(--muted);margin-top:-8px;margin-bottom:6px}
.math-preview{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;min-height:36px;margin-bottom:12px;font-size:13px;line-height:1.9;word-break:break-word}
.math-render .katex{font-size:1em}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.cat-item:last-child{border-bottom:none}
#loading{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:12px;font-size:13px;color:var(--muted)}
#loading.hidden{display:none}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.spinner-sm{display:inline-block;width:12px;height:12px;border:2px solid #c7d2fe;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.muted{font-size:12px;color:var(--muted)}
.section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
h2{font-size:16px;font-weight:700}
.divider{height:1px;background:var(--border);margin:14px 0}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><span id="loading-text">載入中…</span></div>

<!-- Setup -->
<div id="screen-setup" class="screen">
  <div style="padding-top:32px;text-align:center;margin-bottom:28px">
    <div style="font-size:36px;margin-bottom:8px">📚</div>
    <h1 style="font-size:22px;font-weight:700;margin-bottom:4px">DS Flashcard</h1>
    <div class="muted">研究所資料結構備考系統</div>
  </div>
  <div class="card">
    <div class="section-title">輸入 Anthropic API Key</div>
    <div class="alert alert-info">AI 批改需要此 Key，只儲存在你的瀏覽器裡。</div>
    <label>Anthropic API Key</label>
    <input type="password" id="setup-key" placeholder="sk-ant-xxxxxxxxxxxxxxxx">
    <button class="btn btn-primary" onclick="saveSetup()">儲存並繼續</button>
  </div>
</div>

<!-- Login -->
<div id="screen-login" class="screen">
  <div style="padding-top:48px;text-align:center;margin-bottom:32px">
    <div style="font-size:40px;margin-bottom:10px">📚</div>
    <h1 style="font-size:22px;font-weight:700;margin-bottom:6px">DS Flashcard</h1>
    <div class="muted">用 Google 帳號登入以同步 Drive 資料</div>
  </div>
  <button class="btn-google" onclick="signIn()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.01c-.72.48-1.63.76-2.7.76-2.09 0-3.85-1.42-4.49-3.32H1.8v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.49 10.49A4.7 4.7 0 0 1 4.24 9c0-.52.09-1.02.25-1.49V5.44H1.8a8 8 0 0 0 0 7.12l2.69-2.07z"/><path fill="#EA4335" d="M8.98 3.58c1.18 0 2.23.41 3.07 1.2l2.3-2.3A8 8 0 0 0 1.8 5.44L4.49 7.51c.64-1.9 2.4-3.93 4.49-3.93z"/></svg>
    使用 Google 帳號登入
  </button>
  <div style="text-align:center;margin-top:14px">
    <span class="muted" style="cursor:pointer;text-decoration:underline" onclick="showScreen('setup')">重新設定 API Key</span>
  </div>
</div>

<!-- Home -->
<div id="screen-home" class="screen">
  <div class="topbar">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div class="muted" style="font-size:11px">DS Flashcard</div><div style="font-weight:700;font-size:16px" id="home-greeting">備考中！</div></div>
      <button class="btn-sm" onclick="signOut()">登出</button>
    </div>
  </div>
  <div id="home-body" style="padding:14px 0 0"></div>
</div>

<!-- Quiz -->
<div id="screen-quiz" class="screen" style="padding:0">
  <div class="topbar">
    <div class="topbar-row" style="justify-content:space-between">
      <div class="topbar-row">
        <button class="back-btn" onclick="exitQuiz()">← 離開</button>
        <div><div class="muted" style="font-size:11px" id="quiz-cat"></div><div style="font-weight:700" id="quiz-progress"></div></div>
      </div>
      <div class="muted" id="quiz-pct"></div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="quiz-prog-bar" style="width:0%"></div></div>
  </div>
  <div style="padding:14px 16px 60px" id="quiz-body"></div>
</div>

<!-- Manage -->
<div id="screen-manage" class="screen" style="padding:0">
  <div class="topbar">
    <div class="topbar-row" style="justify-content:space-between">
      <div class="topbar-row">
        <button class="back-btn" onclick="showScreen('home');renderHome()">← 返回</button>
        <h2>題庫管理</h2>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
        <button class="btn-sm accent" onclick="openCats()">⊞ 分類</button>
        <button class="btn btn-primary" style="width:auto;padding:6px 12px;margin:0;font-size:13px" onclick="openAddNew()">＋ 新增</button>
      </div>
    </div>
    <input type="search" id="search-input" placeholder="搜尋題目或分類…" style="margin-top:10px;margin-bottom:0" oninput="renderManage()">
  </div>
  <div style="padding:12px 16px 60px" id="manage-body"></div>
</div>

<!-- Category Manager -->
<div id="screen-cats" class="screen" style="padding:0">
  <div class="topbar">
    <div class="topbar-row">
      <button class="back-btn" onclick="showScreen('manage');renderManage()">← 返回</button>
      <h2>分類管理</h2>
    </div>
  </div>
  <div style="padding:14px 16px 60px">
    <div class="card">
      <div class="section-title">新增分類</div>
      <div style="display:flex;gap:8px;align-items:flex-start">
        <input type="text" id="new-cat-name" placeholder="輸入新分類名稱…" style="margin-bottom:0;flex:1">
        <button class="btn btn-primary" style="width:auto;margin:0;padding:10px 16px" onclick="addCategory()">新增</button>
      </div>
    </div>
    <div class="card">
      <div class="section-title">目前分類</div>
      <div id="cat-list"><div class="muted" style="text-align:center;padding:16px 0">載入中…</div></div>
    </div>
    <div class="alert alert-warn">「其他」分類無法刪除。其餘分類均可刪除，題目自動歸入「其他」。</div>
  </div>
</div>

<!-- Add / Edit -->
<div id="screen-add" class="screen" style="padding:0">
  <div class="topbar">
    <div class="topbar-row">
      <button class="back-btn" onclick="showScreen('manage');renderManage()">← 返回</button>
      <h2 id="add-title">新增題目</h2>
    </div>
  </div>
  <div style="padding:14px 16px 60px">
    <div class="card">
      <label>分類</label>
      <select id="f-category"></select>
      <label>題目</label>
      <div class="math-toolbar" id="toolbar-q"></div>
      <textarea id="f-question" rows="4" placeholder="題目… 數學式用 $…$ 包住，例如 $O(n^2)$" oninput="updatePreview('q')"></textarea>
      <div class="math-hint">▸ 預覽</div>
      <div class="math-preview math-render" id="preview-q"></div>
      <label>標準答案</label>
      <div class="math-toolbar" id="toolbar-a"></div>
      <textarea id="f-answer" rows="6" placeholder="標準答案…" oninput="updatePreview('a')"></textarea>
      <div class="math-hint">▸ 預覽</div>
      <div class="math-preview math-render" id="preview-a"></div>
      <button class="btn btn-primary" onclick="saveCard()">儲存</button>
      <button class="btn btn-secondary" onclick="showScreen('manage');renderManage()">取消</button>
    </div>
  </div>
</div>

<script>
const CLIENT_ID="16377008216-n7srio84pbbfkm6q8fdmq3ss3po1pbum.apps.googleusercontent.com";
const SCOPE="https://www.googleapis.com/auth/drive.file";
const FILE_NAME="ds_flashcards.json";
const PROTECTED_CAT="其他";
const DEFAULT_CATS=["Tree","Graph","Sorting","Hashing","Heap","Dynamic Programming","其他"];
const CAT_COLORS=["#ede9fe:#5b21b6","#d1fae5:#065f46","#fef9c3:#854d0e","#fee2e2:#991b1b","#fce7f3:#9d174d","#dbeafe:#1e3a8a","#f1f5f9:#475569","#fef3c7:#92400e","#fae8ff:#7e22ce","#dcfce7:#166534","#fce7f3:#9d174d","#dbeafe:#1e3a8a","#fff1f2:#9f1239","#ecfdf5:#065f46"];
// Math symbol groups (題目/答案輸入工具列用)
const MATH_GROUPS=[
  {group:"複雜度",syms:[
    {l:"O(n)",v:"$O(n)$"},{l:"O(n²)",v:"$O(n^2)$"},{l:"O(n³)",v:"$O(n^3)$"},
    {l:"O(n log n)",v:"$O(n \\log n)$"},{l:"O(log n)",v:"$O(\\log n)$"},
    {l:"O(2ⁿ)",v:"$O(2^n)$"},{l:"O(n!)",v:"$O(n!)$"},{l:"O(√n)",v:"$O(\\sqrt{n})$"},
    {l:"Ω(n)",v:"$\\Omega(n)$"},{l:"Θ(n)",v:"$\\Theta(n)$"},
    {l:"ω(n)",v:"$\\omega(n)$"},{l:"o(n)",v:"$o(n)$"},
  ]},
  {group:"對數",syms:[
    {l:"log",v:"$\\log$"},{l:"log₂",v:"$\\log_2$"},{l:"logₙ",v:"$\\log_{}$"},
    {l:"lg",v:"$\\lg$"},{l:"ln",v:"$\\ln$"},{l:"log²n",v:"$\\log^2 n$"},
  ]},
  {group:"分數",syms:[
    {l:"a/b",v:"$\\frac{a}{b}$"},{l:"1/2",v:"$\\frac{1}{2}$"},
    {l:"1/n",v:"$\\frac{1}{n}$"},{l:"(n-1)/2",v:"$\\frac{n-1}{2}$"},
    {l:"n/log n",v:"$\\frac{n}{\\log n}$"},
  ]},
  {group:"上下標",syms:[
    {l:"xⁿ",v:"$x^{}$"},{l:"xₙ",v:"$x_{}$"},{l:"xⁿₘ",v:"$x_{}^{}$"},
    {l:"2ⁿ",v:"$2^{n}$"},{l:"nᵏ",v:"$n^{k}$"},{l:"aᵢⱼ",v:"$a_{ij}$"},
  ]},
  {group:"根號/取整",syms:[
    {l:"√n",v:"$\\sqrt{n}$"},{l:"√x",v:"$\\sqrt{x}$"},{l:"∛n",v:"$\\sqrt[3]{n}$"},
    {l:"⌈x⌉",v:"$\\lceil x \\rceil$"},{l:"⌊x⌋",v:"$\\lfloor x \\rfloor$"},
  ]},
  {group:"求和/積分",syms:[
    {l:"∑",v:"$\\sum_{i=1}^{n}$"},{l:"∏",v:"$\\prod_{i=1}^{n}$"},
    {l:"∫",v:"$\\int_{a}^{b}$"},{l:"C(n,k)",v:"$\\binom{n}{k}$"},{l:"n!",v:"$n!$"},
  ]},
  {group:"比較/符號",syms:[
    {l:"≤",v:"$\\leq$"},{l:"≥",v:"$\\geq$"},{l:"≠",v:"$\\neq$"},{l:"≈",v:"$\\approx$"},
    {l:"∞",v:"$\\infty$"},{l:"→",v:"$\\rightarrow$"},{l:"⇒",v:"$\\Rightarrow$"},
    {l:"⟺",v:"$\\Leftrightarrow$"},{l:"←",v:"$\\leftarrow$"},
  ]},
  {group:"集合",syms:[
    {l:"∈",v:"$\\in$"},{l:"∉",v:"$\\notin$"},{l:"⊆",v:"$\\subseteq$"},
    {l:"⊂",v:"$\\subset$"},{l:"∪",v:"$\\cup$"},{l:"∩",v:"$\\cap$"},
    {l:"∅",v:"$\\emptyset$"},
  ]},
  {group:"邏輯",syms:[
    {l:"∀",v:"$\\forall$"},{l:"∃",v:"$\\exists$"},{l:"¬",v:"$\\neg$"},
    {l:"∧",v:"$\\land$"},{l:"∨",v:"$\\lor$"},
  ]},
  {group:"希臘字母",syms:[
    {l:"α",v:"$\\alpha$"},{l:"β",v:"$\\beta$"},{l:"γ",v:"$\\gamma$"},
    {l:"δ",v:"$\\delta$"},{l:"ε",v:"$\\epsilon$"},{l:"λ",v:"$\\lambda$"},
    {l:"μ",v:"$\\mu$"},{l:"π",v:"$\\pi$"},{l:"σ",v:"$\\sigma$"},
    {l:"φ",v:"$\\phi$"},{l:"ω",v:"$\\omega$"},{l:"Ω",v:"$\\Omega$"},
    {l:"Θ",v:"$\\Theta$"},{l:"Γ",v:"$\\Gamma$"},{l:"Δ",v:"$\\Delta$"},
  ]},
];
// Flat list for quiz quick-insert (most frequent)
const MATH_SYMS=[
  {l:"O(n)",v:"$O(n)$"},{l:"O(n²)",v:"$O(n^2)$"},{l:"O(n log n)",v:"$O(n \\log n)$"},
  {l:"O(log n)",v:"$O(\\log n)$"},{l:"Ω(n)",v:"$\\Omega(n)$"},{l:"Θ(n)",v:"$\\Theta(n)$"},
  {l:"ω(n)",v:"$\\omega(n)$"},{l:"o(n)",v:"$o(n)$"},
  {l:"log",v:"$\\log$"},{l:"ln",v:"$\\ln$"},{l:"lg",v:"$\\lg$"},{l:"log₂",v:"$\\log_2$"},
  {l:"a/b",v:"$\\frac{a}{b}$"},{l:"1/n",v:"$\\frac{1}{n}$"},
  {l:"√n",v:"$\\sqrt{n}$"},{l:"2ⁿ",v:"$2^{n}$"},
  {l:"≤",v:"$\\leq$"},{l:"≥",v:"$\\geq$"},{l:"≠",v:"$\\neq$"},{l:"∞",v:"$\\infty$"},
  {l:"xⁿ",v:"$x^{}$"},{l:"xₙ",v:"$x_{}$"},
  {l:"∑",v:"$\\sum_{i=1}^{n}$"},{l:"∏",v:"$\\prod_{i=1}^{n}$"},
  {l:"⌈x⌉",v:"$\\lceil x \\rceil$"},{l:"⌊x⌋",v:"$\\lfloor x \\rfloor$"},
  {l:"C(n,k)",v:"$\\binom{n}{k}$"},{l:"n!",v:"$n!$"},
  {l:"∈",v:"$\\in$"},{l:"⊆",v:"$\\subseteq$"},{l:"∪",v:"$\\cup$"},{l:"∩",v:"$\\cap$"},
  {l:"→",v:"$\\rightarrow$"},{l:"⇒",v:"$\\Rightarrow$"},
  {l:"∀",v:"$\\forall$"},{l:"∃",v:"$\\exists$"},{l:"∧",v:"$\\land$"},{l:"∨",v:"$\\lor$"},
  {l:"α",v:"$\\alpha$"},{l:"β",v:"$\\beta$"},{l:"λ",v:"$\\lambda$"},

// Returns categories sorted: non-protected first (original order), PROTECTED_CAT last
function sortedCats(){
  return [...categories.filter(c=>c!==PROTECTED_CAT), PROTECTED_CAT];
}
function catColor(cat){
  const all=[...DEFAULT_CATS.filter(c=>c!==PROTECTED_CAT),...categories.filter(c=>!DEFAULT_CATS.includes(c)),PROTECTED_CAT];
  const idx=all.indexOf(cat);
  const pair=CAT_COLORS[Math.abs(idx>=0?idx:0)%CAT_COLORS.length];
  const[bg,fg]=pair.split(':');return{bg,fg};
}
function badgeHtml(cat){

// ── MATH ──
function renderMath(text){
  if(!window.katex||!text){
    return(text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\$([^$\n]+)\$/g,(_,e)=>{try{return katex.renderToString(e,{throwOnError:false})}catch(ex){return'$'+e+'$'}})
    .replace(/\n/g,'<br>');
}
function updatePreview(f){

function insertAt(ta,text){
  if(!ta)return;ta.focus();
  const st=ta.selectionStart,en=ta.selectionEnd;
  ta.value=ta.value.slice(0,st)+text+ta.value.slice(en);
  ta.selectionStart=ta.selectionEnd=st+text.length;
  ta.dispatchEvent(new Event('input'));
}

// ── DRIVE ──
async function driveReq(url,opts={}){
  const r=await fetch(url,{...opts,headers:{"Authorization":"Bearer "+accessToken,...(opts.headers||{})}});
  if(!r.ok)throw new Error("Drive "+r.status);return r;
}
async function loadDriveData(){
  const r=await driveReq(`https://www.googleapis.com/drive/v3/files?q=name='${FILE_NAME}'+and+trashed=false&fields=files(id)`);
  const d=await r.json();
  if(d.files?.length){
    driveFileId=d.files[0].id;
    const f=await driveReq(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`);
    const j=await f.json();
    cards=j.cards||[];
    let cats=j.categories||[...DEFAULT_CATS];
    if(!cats.includes(PROTECTED_CAT))cats.push(PROTECTED_CAT);
    categories=cats;
  }else{
    cards=getSampleCards();categories=[...DEFAULT_CATS];await saveToDrive();
  }
}
async function saveToDrive(){
  const blob=new Blob([JSON.stringify({version:6,lastSync:Date.now(),cards,categories})],{type:'application/json'});
  const form=new FormData();
  if(driveFileId){
    form.append('metadata',new Blob([JSON.stringify({name:FILE_NAME})],{type:'application/json'}));
    form.append('file',blob);
    await driveReq(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=multipart`,{method:'PATCH',body:form});
  }else{
    form.append('metadata',new Blob([JSON.stringify({name:FILE_NAME,mimeType:'application/json'})],{type:'application/json'}));
    form.append('file',blob);
    const res=await driveReq(`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id`,{method:'POST',body:form});
    driveFileId=(await res.json()).id;
  }
}

// ── SM-2 / CARDS ──
function applySmTwo(card,correct){
  const c={...card};
  if(correct){
    if(c.repetitions===0)c.interval=1;
    else if(c.repetitions===1)c.interval=6;
    else c.interval=Math.round(c.interval*c.easeFactor);
    c.repetitions++;c.easeFactor=Math.max(1.3,parseFloat((c.easeFactor+0.1).toFixed(2)));
  }else{c.repetitions=0;c.interval=1;c.easeFactor=Math.max(1.3,parseFloat((c.easeFactor-0.2).toFixed(2)))}
  c.nextReview=Date.now()+c.interval*86400000;return c;
}
function createCard(q,a,cat){return{id:uid(),question:q,answer:a,category:cat,repetitions:0,interval:1,easeFactor:2.5,nextReview:Date.now(),createdAt:Date.now()}}
function getSampleCards(){
  return[
    {question:"請說明 AVL Tree 的平衡條件，並列舉四種旋轉情況（LL, RR, LR, RL）",answer:"每個節點 BF 絕對值 $\\leq 1$。LL→右旋、RR→左旋、LR→先左旋左子再右旋、RL→先右旋右子再左旋。",category:"Tree"},
    {question:"分析 Quick Sort 的最佳、平均、最差時間複雜度",answer:"最佳 $O(n \\log n)$、平均 $O(n \\log n)$、最差 $O(n^2)$（pivot 每次選到極值）。",category:"Sorting"},
    {question:"什麼是 Hash Collision？請說明兩種解決方式",answer:"不同 key 映射到相同 hash 值。Chaining：同 slot 用 linked list；Open Addressing：線性探測找空 slot。",category:"Hashing"},
    {question:"請說明 Dijkstra 演算法的運作流程與時間複雜度",answer:"單源最短路徑。每次選 dist 最小節點更新鄰居。Min-heap：$O((V+E)\\log V)$；陣列：$O(V^2)$。",category:"Graph"},
    {question:"請說明 Heap Sort 的原理與時間複雜度，並說明為何不穩定",answer:"Build Max-Heap $O(n)$，反覆 heapify $O(\\log n)$，總 $O(n \\log n)$。不穩定因 heapify 改變相同鍵值順序。",category:"Heap"},
    {question:"解釋動態規劃的兩個核心性質，並舉一例說明",answer:"最優子結構 + 重疊子問題。Fibonacci 從 $O(2^n)$ 用 memoization 降至 $O(n)$。",category:"Dynamic Programming"},
  ].map(s=>createCard(s.question,s.answer,s.category));
}

  });
}

function startDrag(cat,startY){
  if(cat===PROTECTED_CAT)return;
  dragSrc=cat;
  const srcRow=document.querySelector(`.cat-item[data-cat="${cat}"]`);
  if(!srcRow)return;
  const rect=srcRow.getBoundingClientRect();
  dragOffsetY=startY-rect.top;
  dragGhost=srcRow.cloneNode(true);
  Object.assign(dragGhost.style,{
    position:'fixed',left:rect.left+'px',top:rect.top+'px',
    width:rect.width+'px',zIndex:'999',opacity:'0.88',
    background:'var(--surface)',boxShadow:'0 6px 20px rgba(0,0,0,.18)',
    borderRadius:'8px',pointerEvents:'none',transition:'none',margin:'0'
  });
  document.body.appendChild(dragGhost);
  srcRow.style.opacity='0.25';
  document.addEventListener('mousemove',onDragMove);
  document.addEventListener('mouseup',onDragRelease);
  document.addEventListener('touchmove',onTouchMove,{passive:false});
  document.addEventListener('touchend',onTouchRelease);
}
function onTouchMove(e){e.preventDefault();moveDragGhost(e.touches[0].clientY);highlightTarget(e.touches[0].clientX,e.touches[0].clientY);}
function onDragMove(e){moveDragGhost(e.clientY);highlightTarget(e.clientX,e.clientY);}
function moveDragGhost(clientY){if(dragGhost)dragGhost.style.top=(clientY-dragOffsetY)+'px';}
function highlightTarget(cx,cy){
  document.querySelectorAll('.cat-item').forEach(r=>r.style.background='');
  if(dragGhost)dragGhost.style.display='none';
  const el=document.elementFromPoint(cx,cy);
  if(dragGhost)dragGhost.style.display='';
  const row=el?.closest('.cat-item');
  if(row&&row.dataset.cat&&row.dataset.cat!==dragSrc&&row.dataset.cat!==PROTECTED_CAT)
    row.style.background='var(--accent-light)';
}
function onTouchRelease(e){finishDrag(e.changedTouches[0].clientX,e.changedTouches[0].clientY);}
function onDragRelease(e){finishDrag(e.clientX,e.clientY);}
function finishDrag(cx,cy){
  document.removeEventListener('mousemove',onDragMove);document.removeEventListener('mouseup',onDragRelease);
  document.removeEventListener('touchmove',onTouchMove);document.removeEventListener('touchend',onTouchRelease);
  if(dragGhost){dragGhost.remove();dragGhost=null;}
  document.querySelectorAll('.cat-item').forEach(r=>{r.style.background='';r.style.opacity='';});
  if(dragGhost)dragGhost.style.display='none';
  const el=document.elementFromPoint(cx,cy);
  const row=el?.closest('.cat-item');
  const targetCat=row?.dataset.cat;
  if(dragSrc&&targetCat&&targetCat!==dragSrc&&targetCat!==PROTECTED_CAT){
    const np=categories.filter(c=>c!==PROTECTED_CAT);
    const si=np.indexOf(dragSrc),ti=np.indexOf(targetCat);
    if(si>=0&&ti>=0){np.splice(si,1);np.splice(ti,0,dragSrc);categories=[...np,PROTECTED_CAT];saveToDrive().catch(()=>{});}
  }
  dragSrc=null;
  renderCatList();
}
function populateCatSelect(){
  const sel=document.getElementById('f-category');if(!sel)return;

  sel.innerHTML=sortedCats().map(c=>`<option value="${c}">${c}</option>`).join('');

function addCategory(){

  // Insert before 其他
  const idx=categories.indexOf(PROTECTED_CAT);
  if(idx>=0)categories.splice(idx,0,name);
  else categories.push(name);
  inp.value='';
  saveToDrive().catch(()=>{});
  renderCatList();

async function deleteCat(cat){
  if(cat===PROTECTED_CAT){alert('「其他」分類無法刪除');return}
  const cnt=cards.filter(c=>c.category===cat).length;
  if(!confirm(cnt>0?`刪除「${cat}」？${cnt} 題將自動歸入「其他」`:`刪除「${cat}」？`))return;
  cards=cards.map(c=>c.category===cat?{...c,category:PROTECTED_CAT}:c);
  categories=categories.filter(c=>c!==cat);
  loading(true,'儲存中…');await saveToDrive();loading(false);renderCatList();
}

// ── CANVAS ──
function initCanvas(){
  const c=document.getElementById('draw-canvas');if(!c)return;
  const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
  c.addEventListener('mousedown',onDown);c.addEventListener('mousemove',onMove);
  c.addEventListener('mouseup',onUp);c.addEventListener('mouseleave',onUp);
  c.addEventListener('touchstart',onDown,{passive:false});c.addEventListener('touchmove',onMove,{passive:false});c.addEventListener('touchend',onUp);
}
function getXY(e){
  const c=document.getElementById('draw-canvas'),r=c.getBoundingClientRect();
  const sx=c.width/r.width,sy=c.height/r.height,src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};
}
function onDown(e){e.preventDefault();isDrawing=true;lastPos=getXY(e)}
function onMove(e){
  e.preventDefault();if(!isDrawing)return;
  const c=document.getElementById('draw-canvas'),ctx=c.getContext('2d'),pos=getXY(e);
  ctx.beginPath();ctx.strokeStyle='#1a1a1a';ctx.lineWidth=penSize;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.moveTo(lastPos.x,lastPos.y);ctx.lineTo(pos.x,pos.y);ctx.stroke();lastPos=pos;
}
function onUp(){
  isDrawing=false;
  // Debounce OCR: wait 1.5s after last stroke
  clearTimeout(ocrTimer);
  ocrTimer=setTimeout(runOcrPreview, 1500);
}
function clearCanvas(){
  const c=document.getElementById('draw-canvas');if(!c)return;
  c.getContext('2d').fillStyle='#fff';c.getContext('2d').fillRect(0,0,c.width,c.height);
  clearTimeout(ocrTimer);
  const pv=document.getElementById('ocr-preview');
  if(pv)pv.innerHTML='<span style="color:var(--hint)">開始手寫後自動辨識…</span>';
}
function setPen(s){penSize=s;document.querySelectorAll('.pen-btn').forEach((b,i)=>b.classList.toggle('active',[2,3,5][i]===s))}

// ── OCR PREVIEW ──
async function runOcrPreview(){
  const c=document.getElementById('draw-canvas');if(!c)return;
  const pv=document.getElementById('ocr-preview');if(!pv)return;

  // Check if canvas is blank
  const ctx=c.getContext('2d');
  const data=ctx.getImageData(0,0,c.width,c.height).data;
  const hasContent=Array.from(data).some((v,i)=>i%4!==3&&v<250);
  if(!hasContent){pv.innerHTML='<span style="color:var(--hint)">開始手寫後自動辨識…</span>';return}

  // Show scanning indicator
  pv.innerHTML=`<span class="ocr-scanning"><span class="spinner-sm"></span>辨識中…</span>`;

  const imgData=c.toDataURL('image/jpeg',0.85).split(',')[1];
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',max_tokens:300,
        system:'請辨識圖片中的手寫文字並完整轉錄。規則：1.每一行手寫文字對應輸出一行，保留換行。2.保留所有數學符號和運算式。3.只輸出辨識結果，不加任何說明。',
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgData}},
          {type:'text',text:'請辨識這張圖片中的手寫內容，每行手寫對應輸出一行文字，保留換行。'}
        ]}]
      })
    });
    const data=await res.json();
    const text=(data.content?.[0]?.text||'').trim();
    if(text){
      pv.classList.add('has-content');
      // renderMath already converts \n to <br>
      pv.innerHTML=renderMath(text);
    }else{
      pv.innerHTML='<span style="color:var(--hint)">無法辨識，請繼續書寫</span>';
    }
  }catch(e){
    pv.innerHTML='<span style="color:var(--hint)">辨識失敗</span>';
  }
}

// ── TYPE PREVIEW ──
function updateTypePreview(){
  const ta=document.getElementById('type-answer'),pv=document.getElementById('type-preview');
  if(!ta||!pv)return;
  const val=ta.value.trim();
  if(!val){pv.textContent='尚未輸入…';pv.classList.remove('has-content');return}
  pv.innerHTML=renderMath(val);pv.classList.add('has-content');
}

// ── SUBMIT ──
async function submitAnswer(){
  const btn=document.getElementById('submit-btn');
  if(btn){btn.disabled=true;btn.textContent='AI 批改中…'}
  const card=quizQueue[quizIdx];
  let msgContent;
  if(answerMode==='draw'){
    const imgData=document.getElementById('draw-canvas').toDataURL('image/jpeg',0.85).split(',')[1];
    msgContent=[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgData}},{type:'text',text:`題目：${card.question}\n\n標準答案：${card.answer}`}];
  }else{
    const typed=(document.getElementById('type-answer')?.value||'').trim();
    if(!typed){alert('請輸入答案');if(btn){btn.disabled=false;btn.textContent='提交答案，AI 批改'}return}
    msgContent=[{type:'text',text:`題目：${card.question}\n\n標準答案：${card.answer}\n\n學生答案：${typed}`}];
  }
  let result;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',max_tokens:200,
        system:`你是資料結構考試批改老師。判斷學生答案是否正確（大意正確即可）。只回傳 JSON：{"correct": true/false, "feedback": "一句說明（繁體中文，25字內）"}`,
        messages:[{role:'user',content:msgContent}]
      })
    });
    const data=await res.json();
    result=JSON.parse((data.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
  }catch(e){result={correct:null,feedback:'批改失敗，請確認 API Key'}}

  if(result.correct!==null){
    const updated=applySmTwo(card,result.correct);
    cards=cards.map(c=>c.id===card.id?updated:c);
    try{await saveToDrive()}catch(e){}
  }
  const intv=result.correct?(card.interval<=1?'明天':card.interval<=6?'6 天後':`${card.interval} 天後`):'明天重試';
  const nextLbl=quizIdx+1>=quizQueue.length?'完成今日複習 ✓':'下一題 →';
  document.getElementById('quiz-body').insertAdjacentHTML('beforeend',`
    <div class="result-card ${result.correct?'correct':result.correct===false?'wrong':''}">
      <div style="font-size:26px;margin-bottom:4px">${result.correct?'✓':result.correct===false?'✗':'?'}</div>
      <div style="font-size:16px;font-weight:700;color:${result.correct?'var(--success)':'var(--danger)'}">
        ${result.correct?'答對了！':result.correct===false?'答錯了':'批改失敗'}</div>
      <div style="font-size:13px;margin-top:4px">${result.feedback}</div>
      <div class="divider"></div>
      <div class="muted" style="font-size:11px;margin-bottom:6px">標準答案</div>
      <div class="math-render" style="font-size:13px;line-height:1.8">${renderMath(card.answer)}</div>
      <div class="muted" style="margin-top:10px;text-align:right;font-size:11px">下次複習：${intv}</div>
    </div>
    <button class="btn btn-primary" onclick="nextCard()">${nextLbl}</button>
  `);
  window.scrollTo(0,document.body.scrollHeight);
}
function nextCard(){
  if(quizIdx+1>=quizQueue.length){showScreen('home');renderHome();return}
  quizIdx++;renderQuiz();window.scrollTo(0,0);
}

// ── MANAGE ──
function renderManage(){
  const q=(document.getElementById('search-input')?.value||'').toLowerCase();
  const filtered=cards.filter(c=>!q||c.question.toLowerCase().includes(q)||c.category.toLowerCase().includes(q));
  const now=Date.now();
  document.getElementById('manage-body').innerHTML=filtered.length===0
    ?`<div class="muted" style="text-align:center;padding:40px 0">${q?'無符合結果':'題庫為空，請先新增題目'}</div>`
    :filtered.map(c=>`
      <div class="card-item">
        <div style="display:flex;align-items:flex-start;gap:10px">
          <div style="flex:1;min-width:0">
            ${badgeHtml(c.category)}
            <div style="font-size:13px;margin-top:6px;line-height:1.55">${c.question.replace(/\$([^$\n]+)\$/g,(_,e)=>{try{return katex.renderToString(e,{throwOnError:false})}catch(ex){return'$'+e+'$'}})}</div>
            <div class="muted" style="margin-top:5px">複習 ${c.repetitions} 次・${c.nextReview<=now?'今日待複習':Math.ceil((c.nextReview-now)/86400000)+' 天後'}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn-sm" onclick="openEdit('${c.id}')">編輯</button>
            <button class="btn-sm danger" onclick="deleteCard('${c.id}')">刪除</button>
          </div>
        </div>
      </div>`).join('');
}
function openAddNew(){
  editId=null;
  document.getElementById('add-title').textContent='新增題目';
  populateCatSelect();
  // Default to first non-protected category
  const first=sortedCats().find(c=>c!==PROTECTED_CAT)||PROTECTED_CAT;
  document.getElementById('f-category').value=first;
  document.getElementById('f-question').value='';document.getElementById('f-answer').value='';
  document.getElementById('preview-q').innerHTML='';document.getElementById('preview-a').innerHTML='';
  buildToolbar('toolbar-q','f-question');buildToolbar('toolbar-a','f-answer');
  showScreen('add');
}
function openEdit(id){
  const c=cards.find(x=>x.id===id);if(!c)return;
  editId=id;
  document.getElementById('add-title').textContent='編輯題目';
  populateCatSelect();
  document.getElementById('f-category').value=c.category;
  document.getElementById('f-question').value=c.question;
  document.getElementById('f-answer').value=c.answer;
  buildToolbar('toolbar-q','f-question');buildToolbar('toolbar-a','f-answer');
  updatePreview('q');updatePreview('a');
  showScreen('add');
}
async function saveCard(){
  const cat=document.getElementById('f-category').value;
  const q=document.getElementById('f-question').value.trim();
  const a=document.getElementById('f-answer').value.trim();
  if(!q||!a){alert('請填寫題目和答案');return}
  if(editId)cards=cards.map(c=>c.id===editId?{...c,category:cat,question:q,answer:a}:c);
  else cards.push(createCard(q,a,cat));
  loading(true,'儲存中…');try{await saveToDrive()}catch(e){alert('儲存失敗')}
  loading(false);editId=null;showScreen('manage');renderManage();
}
async function deleteCard(id){
  if(!confirm('確定刪除此題目？'))return;
  cards=cards.filter(c=>c.id!==id);
  loading(true,'刪除中…');try{await saveToDrive()}catch(e){}loading(false);renderManage();
}

// ── INIT ──
window.addEventListener('load',()=>{
  loading(false);
  if(!getApiKey()){showScreen('setup');return}
  const wait=setInterval(()=>{
    if(window.google?.accounts?.oauth2){clearInterval(wait);initGoogleAuth();showScreen('login');}
  },100);
});
</script>
